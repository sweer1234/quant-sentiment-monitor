apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: qsm-api
spec:
  podSelector:
    matchLabels:
      app: qsm-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
    - to:
        - namespaceSelector: {}
