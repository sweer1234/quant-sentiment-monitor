name: tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify bootstrap + full smoke
        run: |
          bash scripts/run_tests.sh

      - name: Run coverage gate
        run: |
          bash scripts/bootstrap_cloud_env.sh --quiet
          python -m pytest --cov=src/quant_sentiment_monitor --cov-report=term --cov-fail-under=75
