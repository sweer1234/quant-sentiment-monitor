version: 1
last_updated: "2026-03-14"
description: "Alert deduplication, suppression and revoke workflow."

deduplication:
  enabled: true
  time_window_minutes: 45
  fingerprint_fields: [title, event_type, impacted_markets]

suppression:
  cooldown_minutes:
    P0: 5
    P1: 10
    P2: 30

escalation:
  p0_unacked_escalate_minutes: 3
  p1_unacked_escalate_minutes: 10
  p2_unacked_escalate_minutes: 30
  min_importance_level: P2
  max_count_per_alert_by_level:
    P0: 3
    P1: 2
    P2: 1
  channels_by_level:
    P0: [app, im, email, phone]
    P1: [app, im, email]
    P2: [app, im]

correction_and_recall:
  enabled: true
  allow_revoke: true
  correction_notice_required: true
