version: "3.9"

services:
  qsm-api:
    build: .
    container_name: qsm-api
    ports:
      - "8000:8000"
    environment:
      QSM_APP_NAME: quant-sentiment-monitor
      QSM_ENV: dev
      QSM_PUBLIC_API_TOKEN: dev-public-token
      QSM_STATE_PATH: data/state.json
      QSM_STATE_BACKEND: sql
      QSM_DATABASE_URL: postgresql+psycopg://qsm:qsm@postgres:5432/qsm
      QSM_QUEUE_BACKEND: redis
      QSM_QUEUE_REDIS_URL: redis://redis:6379/0
      QSM_MODEL_BACKEND: http
      QSM_MODEL_SERVICE_URL: http://qsm-model:9000/infer
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
    depends_on:
      - postgres
      - redis
      - qsm-model

  qsm-model:
    build: .
    container_name: qsm-model
    command: ["uvicorn", "model_service.main:app", "--host", "0.0.0.0", "--port", "9000"]
    environment:
      PYTHONPATH: /app/src
    ports:
      - "9000:9000"

  postgres:
    image: postgres:16
    container_name: qsm-postgres
    environment:
      POSTGRES_DB: qsm
      POSTGRES_USER: qsm
      POSTGRES_PASSWORD: qsm
    ports:
      - "5432:5432"
    volumes:
      - qsm-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: qsm-redis
    ports:
      - "6379:6379"
    volumes:
      - qsm-redis-data:/data

volumes:
  qsm-postgres-data:
  qsm-redis-data:

