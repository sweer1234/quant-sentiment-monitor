version: "3.9"

services:
  qsm-api:
    build: .
    container_name: qsm-api
    ports:
      - "8000:8000"
    environment:
      QSM_APP_NAME: quant-sentiment-monitor
      QSM_ENV: dev
      QSM_PUBLIC_API_TOKEN: dev-public-token
      QSM_STATE_PATH: data/state.json
      QSM_STATE_BACKEND: sql
      QSM_DATABASE_URL: postgresql+psycopg://qsm:qsm@postgres:5432/qsm
      QSM_QUEUE_BACKEND: redis
      QSM_QUEUE_REDIS_URL: redis://redis:6379/0
      QSM_MODEL_BACKEND: http
      QSM_MODEL_SERVICE_URL: http://qsm-model:9000/infer
      QSM_NOTIFICATION_BACKEND: mock
      QSM_NOTIFY_EMAIL_TO: ""
      QSM_IM_WEBHOOK_URL: ""
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
    depends_on:
      - postgres
      - redis
      - qsm-model

  qsm-model:
    build: .
    container_name: qsm-model
    command: ["uvicorn", "model_service.main:app", "--host", "0.0.0.0", "--port", "9000"]
    environment:
      PYTHONPATH: /app/src
    ports:
      - "9000:9000"

  postgres:
    image: postgres:16
    container_name: qsm-postgres
    environment:
      POSTGRES_DB: qsm
      POSTGRES_USER: qsm
      POSTGRES_PASSWORD: qsm
    ports:
      - "5432:5432"
    volumes:
      - qsm-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: qsm-redis
    ports:
      - "6379:6379"
    volumes:
      - qsm-redis-data:/data

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: qsm-prometheus
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus

  grafana:
    image: grafana/grafana:11.1.4
    container_name: qsm-grafana
    profiles: ["observability"]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:2.9.9
    container_name: qsm-loki
    profiles: ["observability"]
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: ["-config.file=/etc/loki/local-config.yaml"]

  promtail:
    image: grafana/promtail:2.9.9
    container_name: qsm-promtail
    profiles: ["observability"]
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./data:/workspace/data:ro
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      - loki
      - qsm-api

volumes:
  qsm-postgres-data:
  qsm-redis-data:
  prometheus-data:
  grafana-data:
  loki-data:

